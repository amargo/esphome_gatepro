substitutions:
  devicename: "driveway-gate"
  name: Driveway Gate

esphome:
  name: ${devicename}
  friendly_name: ${name}
  project:
    name: esphome.web
    version: dev
  on_boot:
    priority: -100
    then:
      - delay: 5s
      - button.press: get_params_btn
      - delay: 2s

esp32:
  board: wemos_d1_mini32
  framework:
    type: arduino

<<: !include .base.yaml

# Enable logging
logger:
  baud_rate: 0
  level: VERBOSE  # Enable verbose logging
  logs:
    gatepro: INFO 

web_server:
  version: 3

captive_portal:

external_components:
  - source:
      type: git
      url: https://github.com/amargo/esphome_gatepro.git
      ref: main
    components: [gatepro]
    refresh: 0s

# BLE devices setup
# esp32_ble_tracker:
#   scan_parameters:
#     active: false

# bluetooth_proxy:
#   active: true

uart:
  id: uart_bus
  baud_rate: 9600
  tx_pin: GPIO1  # Connect to WHITE wire
  rx_pin: GPIO3  # Connect to BLUE wire
  debug:
    direction: BOTH
    dummy_receiver: false
    sequence:
      - lambda: |-
          UARTDebug::log_string(direction, bytes);

# Gate cover component with parameter controls
cover:
  - platform: gatepro
    name: "${name}"
    device_class: gate
    update_interval: 0.2s  # Faster updates for more responsive UI
    source: "P00287D7"  # Default source ID
    
    # Basic operation buttons
    open: open_btn
    close: close_btn
    stop: stop_btn

    # Button components
    set_learn: auto_learn_btn
    get_params: get_params_btn
    remote_learn: remote_learn_btn
    
    # Number slider components (parameter groups)
    set_speed: speed_slider              # group 4 - Operation speed
    set_decel_dist: decel_dist_slider    # group 5 - Deceleration distance
    set_decel_speed: decel_speed_slider  # group 6 - Deceleration speed
    set_max_amp: max_amp_slider          # group 7 - Maximum current/torque
    set_auto_close: auto_close_slider    # group 2 - Auto close timer
    set_small_gate_timer: small_gate_timer # group 8 - Small gate timer
    set_force_detection: force_detection_number # group A - Force detection mode
    
    # Text sensor components
    txt_devinfo: devinfo_sensor          # Device information
    txt_learn_status: learn_status_sensor # Learn status information
    
    # Switch components (parameter groups)
    sw_permalock: permalock_switch
    sw_infra1: infra1_switch
    sw_infra2: infra2_switch

# Parameter control buttons
button:
  # System buttons
  - platform: restart
    id: reboot_btn
    entity_category: "diagnostic"

  # Basic operation buttons (integrated with cover component)
  - platform: template
    name: "Gate Open"
    id: open_btn
    entity_category: "config"
    
  - platform: template
    name: "Gate Close"
    id: close_btn
    entity_category: "config"
    
  - platform: template
    name: "Gate Stop"
    id: stop_btn
    entity_category: "config"

  # GatePro control buttons
  - platform: template
    name: "Auto Learn"
    id: auto_learn_btn
    entity_category: "config"
    
  - platform: template
    name: "Get Parameters"
    id: get_params_btn
    entity_category: "config"
    
  - platform: template
    name: "Learn Remote"
    id: remote_learn_btn
    entity_category: "config"

# Diagnostic sensors
sensor:
  - platform: wifi_signal
    name: "WiFi Signal dB sensor"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"
  - platform: uptime
    type: seconds
    name: "Uptime sensor"
    id: uptime_sensor
    update_interval: 60s
    entity_category: "diagnostic"

# Parameter control sliders
number:
  
    # Group 4: 0-3 (1=default, 1=50%, 2=70%, 3=85%, 4=100%)
  - platform: template
    name: "Operation Speed"
    id: speed_slider
    min_value: 1
    max_value: 4
    step: 1
    optimistic: true
    entity_category: "config"
    
    # Group 5: 0-4 (1=default, 1=75%, 2=80%, 3=85%, 4=90%, 5=95%)
  - platform: template
    name: "Deceleration Distance"
    id: decel_dist_slider
    min_value: 1
    max_value: 5
    step: 1
    optimistic: true
    entity_category: "config"
    
    # Group 6: 0-3 (1=default, 1=80%, 2=60%, 3=40%, 4=25%)
  - platform: template
    name: "Deceleration Speed"
    id: decel_speed_slider
    min_value: 1
    max_value: 4
    step: 1
    optimistic: true
    entity_category: "config"
    
    # Group 7: 1-9 (1=default, 1=2A, 2=3A, 3=4A, 4=5A, 5=6A, 6=7A, 7=8A, 8=9A, 9=10A, A=11A, C=12A, E=13A)
  - platform: template
    name: "Maximum Current (Torque)"
    id: max_amp_slider
    min_value: 1
    max_value: 9
    step: 1
    optimistic: true
    entity_category: "config"
    
    # Group 2: 0-8 (0=disabled, 1=5s, 2=15s, 3=30s, 4=45s, 5=60s, 6=80s, 7=120s, 8=180s)
  - platform: template
    name: "Auto Close Timer"
    id: auto_close_slider
    min_value: 0
    max_value: 8
    step: 1
    optimistic: true
    entity_category: "config"
    
    # Group 8: 1-6 (1=3s, 2=6s, 3=9s, 4=12s, 5=15s, 6=18s)
  - platform: template
    name: "Small Gate Timer"
    id: small_gate_timer
    min_value: 1
    max_value: 6
    step: 1
    optimistic: true
    entity_category: "config"

    # Group A: 0-3 (0=disabled, 1=Stop + reverse 1mp, 2=Stop + reverse 3mp, 3=Stop + reverse to end)
  - platform: template
    name: "Force Detection Mode"
    id: force_detection_number
    min_value: 0
    max_value: 3
    step: 1
    optimistic: true
    entity_category: "config"

# Parameter control switches
# Switch value ranges and descriptions:
# Group 13 (sw_infra1): 0-1 (0=disabled, 1=enabled) - Infrared sensor 1
# Group 14 (sw_infra2): 0-1 (0=disabled, 1=enabled) - Infrared sensor 2
# Group 15 (sw_permalock): 0-1 (0=disabled, 1=enabled) - Permanent lock
switch:
    # Group 15: L-0: disabled, L-1: enabled
  - platform: template
    name: "Permanent Lock"
    id: permalock_switch
    optimistic: true
    entity_category: "config"
    
    # Group 13: L-0: disabled, L-1: enabled
  - platform: template
    name: "Infrared Sensor 1"
    id: infra1_switch
    optimistic: true
    entity_category: "config"
    
    # Group 14: L-0: disabled, L-1: enabled
  - platform: template
    name: "Infrared Sensor 2"
    id: infra2_switch
    optimistic: true
    entity_category: "config"

text_sensor:
  - platform: version
    name: "ESPHome Version"
    id: esphome_version
    entity_category: "diagnostic"
    
  - platform: template
    name: "Device Info"
    id: devinfo_sensor
    entity_category: "diagnostic"
    
  - platform: template
    name: "Learn Status"
    id: learn_status_sensor
    entity_category: "diagnostic"