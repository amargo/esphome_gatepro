substitutions:
  devicename: "driveway-gate"
  name: Driveway Gate

esphome:
  name: ${devicename}
  friendly_name: ${name}
  project:
    name: esphome.web
    version: dev
  on_boot:
    priority: -100
    then:
      - delay: 5s
      - button.press: get_params_btn
      - delay: 2s

esp32:
  board: wemos_d1_mini32
  framework:
    type: arduino

<<: !include .base.yaml

# Enable logging
logger:
  baud_rate: 0
  level: VERBOSE  # Enable verbose logging
  logs:
    gatepro: INFO 

web_server:
  version: 3

captive_portal:

external_components:
  - source:
      type: git
      url: https://github.com/amargo/esphome_gatepro.git
      ref: main
    components: [gatepro]
    refresh: 0s

# BLE devices setup
# esp32_ble_tracker:
#   scan_parameters:
#     active: false

# bluetooth_proxy:
#   active: true

uart:
  id: uart_bus
  baud_rate: 9600
  tx_pin: GPIO1  # Connect to WHITE wire
  rx_pin: GPIO3  # Connect to BLUE wire
  debug:
    direction: BOTH
    dummy_receiver: false
    sequence:
      - lambda: |-
          UARTDebug::log_string(direction, bytes);

# Gate cover component with parameter controls
cover:
  - platform: gatepro
    name: "${name}"
    device_class: gate
    update_interval: 0.2s  # Faster updates for more responsive UI
    source: "P00287D7"  # Default source ID
    
    # Basic operation buttons
    open: open_btn
    close: close_btn
    stop: stop_btn

    # Button components
    set_learn: auto_learn_btn
    get_params: get_params_btn
    remote_learn: remote_learn_btn
    
    # Number slider components (parameter groups)
    set_speed: speed_slider              # group 3 - Operation speed
    set_decel_dist: decel_dist_slider    # group 4 - Deceleration distance
    set_decel_speed: decel_speed_slider  # group 5 - Deceleration speed
    set_max_amp: max_amp_slider          # group 6 - Maximum current/torque
    set_auto_close: auto_close_slider    # group 1 - Auto close timer
    
    # Text sensor components
    txt_devinfo: devinfo_sensor          # Device information
    txt_learn_status: learn_status_sensor # Learn status information
    
    # Switch components (parameter groups)
    sw_permalock: permalock_switch       # group 15 - Permanent lock
    sw_infra1: infra1_switch            # group 13 - Infrared sensor 1
    sw_infra2: infra2_switch            # group 14 - Infrared sensor 2

# Parameter control buttons
button:
  # System buttons
  - platform: restart
    name: "Reboot"
    id: reboot_btn
    entity_category: "diagnostic"

  # Basic operation buttons (integrated with cover component)
  - platform: template
    name: "Gate Open"
    id: open_btn
    entity_category: "config"
    
  - platform: template
    name: "Gate Close"
    id: close_btn
    entity_category: "config"
    
  - platform: template
    name: "Gate Stop"
    id: stop_btn
    entity_category: "config"

  # GatePro control buttons
  - platform: template
    name: "Auto Learn"
    id: auto_learn_btn
    entity_category: "config"
    
  - platform: template
    name: "Get Parameters"
    id: get_params_btn
    entity_category: "config"
    
  - platform: template
    name: "Learn Remote"
    id: remote_learn_btn
    entity_category: "config"

# Diagnostic sensors
sensor:
  - platform: wifi_signal
    name: "WiFi Signal dB sensor"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"
  - platform: uptime
    type: seconds
    name: "Uptime sensor"
    id: uptime_sensor
    update_interval: 60s
    entity_category: "diagnostic"

# Parameter control sliders
number:
  - platform: template
    name: "Operation Speed"
    id: speed_slider
    min_value: 0
    max_value: 3
    step: 1
    optimistic: true
    entity_category: "config"
    
  - platform: template
    name: "Deceleration Distance"
    id: decel_dist_slider
    min_value: 0
    max_value: 4
    step: 1
    optimistic: true
    entity_category: "config"
    
  - platform: template
    name: "Deceleration Speed"
    id: decel_speed_slider
    min_value: 0
    max_value: 3
    step: 1
    optimistic: true
    entity_category: "config"
    
  - platform: template
    name: "Maximum Current (Torque)"
    id: max_amp_slider
    min_value: 0
    max_value: 8
    step: 1
    optimistic: true
    entity_category: "config"
    
  - platform: template
    name: "Auto Close Timer"
    id: auto_close_slider
    min_value: 0
    max_value: 7
    step: 1
    optimistic: true
    entity_category: "config"

# Parameter control switches
switch:
  - platform: template
    name: "Permanent Lock"
    id: permalock_switch
    optimistic: true
    entity_category: "config"
    
  - platform: template
    name: "Infrared Sensor 1"
    id: infra1_switch
    optimistic: true
    entity_category: "config"
    
  - platform: template
    name: "Infrared Sensor 2"
    id: infra2_switch
    optimistic: true
    entity_category: "config"

text_sensor:
  - platform: version
    name: "ESPHome Version"
    id: esphome_version
    entity_category: "diagnostic"
    
  - platform: template
    name: "Device Info"
    id: devinfo_sensor
    entity_category: "diagnostic"
    
  - platform: template
    name: "Learn Status"
    id: learn_status_sensor
    entity_category: "diagnostic"